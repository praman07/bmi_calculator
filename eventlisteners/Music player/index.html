<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spotify Basic Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <audio id="song1" src="./tick.mp3"></audio>
<audio id="song2" src="./tick2.mp3"></audio>
<audio id="song3" src="./tick3.mp3"></audio>
<div class="container">

  <h1>Select song </h1>

  <div class="song-list">
    <div class="song active" data-index="0">Song One</div>
    <div class="song" data-index="1">Song Two</div>
    <div class="song" data-index="2">Song Three</div>
  </div>

  <div class="player">
    <button id="prev">⏮</button>
    <button id="playPause">▶</button>
    <button id="next">⏭</button>
  </div>


</div>

<script src="script.js"></script>
</body>
</html>
