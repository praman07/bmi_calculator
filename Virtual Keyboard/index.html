<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Piano</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main>
  <!-- audio -->
  <audio id="c" src="./piano/C4.mp3"></audio>
  <audio id="d" src="./piano/D4.mp3"></audio>
  <audio id="e" src="./piano/E4.mp3"></audio>
  <audio id="f" src="./piano/F4.mp3"></audio>
  <audio id="g" src="./piano/G4.mp3"></audio>
  <audio id="a" src="./piano/A4.mp3"></audio>
  <audio id="b" src="./piano/B4.mp3"></audio>

  <audio id="cs" src="./piano/Db4.mp3"></audio>
  <audio id="ds" src="./piano/Eb4.mp3"></audio>
  <audio id="fs" src="./piano/Gb4.mp3"></audio>
  <audio id="gs" src="./piano/Ab4.mp3"></audio>
  <audio id="as" src="./piano/Bb4.mp3"></audio>

  <div class="piano">
    <!-- black keys -->
    <div class="black k1">W</div>
    <div class="black k2">E</div>
    <div class="black k3">T</div>
    <div class="black k4">Y</div>
    <div class="black k5">U</div>

    <!-- white keys -->
    <div class="white" id="keyA">A</div>
    <div class="white" id="keyS">S</div>
    <div class="white" id="keyD">D</div>
    <div class="white" id="keyF">F</div>
    <div class="white" id="keyG">G</div>
    <div class="white" id="keyH">H</div>
    <div class="white" id="keyJ">J</div>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
